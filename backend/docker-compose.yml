version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: capsule_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capsule}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capsule123}
      POSTGRES_DB: ${POSTGRES_DB:-capsule_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-capsule} -d ${POSTGRES_DB:-capsule_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
